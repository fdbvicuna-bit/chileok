<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChileOK</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Nunito',sans-serif;background:#070c18;color:#e2e8f0;height:100dvh;overflow:hidden}
  #app{position:relative;width:100%;height:100dvh;overflow:hidden}
  #map{position:absolute;inset:0;z-index:1}
  .leaflet-tile-pane{filter:brightness(0.85) saturate(0.7) hue-rotate(190deg) invert(1)}
  .leaflet-control-zoom a{background:rgba(5,10,20,0.92)!important;color:#94a3b8!important;border:1px solid rgba(255,255,255,0.12)!important;font-size:16px!important}
  .leaflet-control-zoom a:hover{background:rgba(34,197,94,0.2)!important;color:#22c55e!important}
  .leaflet-control-attribution{display:none!important}
  .leaflet-control-zoom{margin-bottom:90px!important;margin-right:12px!important}
  .btn{cursor:pointer;border:none;transition:all .18s;font-family:'Nunito',sans-serif}
  .btn:active{transform:scale(.95)}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes ripple{0%{transform:translate(-50%,-50%) scale(0);opacity:.9}100%{transform:translate(-50%,-50%) scale(3.5);opacity:0}}
  @keyframes pinDrop{0%{transform:translate(-50%,-120%) scale(.3);opacity:0}65%{transform:translate(-50%,-98%) scale(1.1)}100%{transform:translate(-50%,-100%) scale(1);opacity:1}}
  .sheet{animation:slideUp .28s cubic-bezier(.32,.72,0,1)}
  .fade{animation:fadeIn .22s ease}
  /* overlay panels */
  .overlay{position:absolute;left:0;right:0;bottom:0;z-index:100;background:rgba(5,10,20,0.97);backdrop-filter:blur(20px);border-radius:22px 22px 0 0;padding:18px 18px 36px;border-top:1px solid rgba(255,255,255,0.08)}
  .pill{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:0 auto 16px}
  /* ranking screen */
  #rankingScreen{position:absolute;inset:0;z-index:200;background:#070c18;display:none;flex-direction:column}
  #rankingScreen.visible{display:flex}
  /* nav bar */
  .navbar{position:absolute;bottom:0;left:0;right:0;z-index:150;background:rgba(5,10,20,0.94);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.07);display:flex;padding:10px 0 20px}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;font-family:'Nunito',sans-serif;cursor:pointer;color:#475569;transition:color .2s}
  .nav-btn.active{color:#22c55e}
  .nav-btn span:first-child{font-size:22px}
  .nav-btn span:last-child{font-size:11px;font-weight:700}
</style>
</head>
<body>
<div id="app">

  <!-- MAPA -->
  <div id="map"></div>

  <!-- Header flotante -->
  <div style="position:absolute;top:0;left:0;right:0;z-index:50;padding:12px 16px;background:linear-gradient(to bottom,rgba(5,10,20,0.88),transparent);display:flex;align-items:center;justify-content:space-between;pointer-events:none">
    <div style="background:rgba(5,10,20,0.9);backdrop-filter:blur(16px);border-radius:14px;padding:8px 14px;border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:6px;pointer-events:auto">
      <span style="font-size:18px">🇨🇱</span>
      <span style="font-weight:900;font-size:18px;color:#fff">Chile</span>
      <span style="font-weight:900;font-size:21px;color:#22c55e;filter:drop-shadow(0 0 7px rgba(34,197,94,.9))">OK</span>
    </div>
    <div id="contador" style="background:rgba(5,10,20,0.9);backdrop-filter:blur(16px);border-radius:12px;padding:8px 12px;border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:6px;pointer-events:auto">
      <div style="width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 1.5s infinite"></div>
      <span id="pinCount" style="font-size:12px;color:#94a3b8;font-weight:700">8 reportes</span>
    </div>
  </div>

  <!-- Instrucción modo placing -->
  <div id="placingTip" style="display:none;position:absolute;top:76px;left:16px;right:16px;z-index:50;background:rgba(5,10,20,0.95);backdrop-filter:blur(16px);border-radius:16px;padding:14px 18px;border:1px solid rgba(34,197,94,0.35);text-align:center" class="fade">
    <div style="font-size:22px;margin-bottom:4px">👆</div>
    <div style="font-size:14px;font-weight:800;color:#fff">Toca el mapa donde está la basura</div>
    <div style="font-size:11px;color:#475569;margin-top:2px">El pin aparecerá en esa ubicación exacta</div>
    <button class="btn" onclick="cancelarReporte()" style="margin-top:10px;padding:6px 18px;border-radius:8px;background:rgba(255,255,255,0.07);color:#64748b;font-size:12px;font-weight:600">Cancelar</button>
  </div>

  <!-- Popup pin seleccionado -->
  <div id="pinPopup" style="display:none;position:absolute;bottom:88px;left:14px;right:14px;z-index:50" class="fade">
    <div id="pinPopupInner" style="background:rgba(5,10,20,0.97);backdrop-filter:blur(18px);border-radius:20px;padding:15px;box-shadow:0 10px 40px rgba(0,0,0,0.6)"></div>
  </div>

  <!-- Botón REPORTAR -->
  <div id="reportBtn" style="position:absolute;bottom:88px;left:50%;transform:translateX(-50%);z-index:50;display:flex;flex-direction:column;align-items:center;gap:5px">
    <button class="btn" onclick="iniciarReporte()" style="width:66px;height:66px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#16a34a);border:4px solid rgba(255,255,255,0.22);box-shadow:0 4px 24px rgba(34,197,94,.55),0 0 0 8px rgba(34,197,94,.12);font-size:26px">📍</button>
    <div style="background:rgba(5,10,20,0.9);backdrop-filter:blur(8px);border-radius:8px;padding:3px 10px;font-size:11px;font-weight:800;color:#22c55e">REPORTAR</div>
  </div>

  <!-- Sheet selección tipo -->
  <div id="sheetTipo" style="display:none" class="overlay sheet">
    <div class="pill"></div>
    <div style="font-size:15px;font-weight:800;color:#fff;margin-bottom:3px">¿Qué tipo de basura?</div>
    <div style="font-size:12px;color:#475569;margin-bottom:14px">Elige la categoría del problema</div>
    <div id="tipoList" style="display:flex;flex-direction:column;gap:8px"></div>
    <button class="btn" onclick="cancelarReporte()" style="width:100%;margin-top:12px;padding:11px;border-radius:12px;background:rgba(255,255,255,0.05);color:#475569;font-size:13px;font-weight:600">Cancelar</button>
  </div>

  <!-- Sheet confirmación -->
  <div id="sheetConfirm" style="display:none" class="overlay sheet">
    <div class="pill"></div>
    <div style="font-size:15px;font-weight:800;color:#fff;margin-bottom:14px">Confirmar reporte</div>
    <div id="confirmCard" style="background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.22);border-radius:14px;padding:13px 15px;margin-bottom:14px;display:flex;align-items:center;gap:12px"></div>
    <div style="display:flex;gap:10px">
      <button class="btn" onclick="volverTipo()" style="flex:1;padding:13px;border-radius:12px;background:rgba(255,255,255,0.06);color:#64748b;font-size:14px;font-weight:600">← Atrás</button>
      <button class="btn" onclick="publicarPin()" style="flex:2;padding:13px;border-radius:12px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-size:14px;font-weight:800;box-shadow:0 4px 16px rgba(34,197,94,.4)">🚀 Publicar pin</button>
    </div>
  </div>

  <!-- Nav bar mapa -->
  <div class="navbar" id="mapNav">
    <button class="nav-btn active" onclick="setVista('mapa',this)"><span>🗺️</span><span>Mapa</span></button>
    <button class="nav-btn" onclick="setVista('ranking',this)"><span>🏆</span><span>Ranking</span></button>
  </div>

  <!-- RANKING SCREEN -->
  <div id="rankingScreen">
    <div style="padding:16px 18px 12px;background:rgba(5,10,20,0.98);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:20px">🇨🇱</span>
        <span style="font-weight:900;font-size:20px;color:#fff">Chile</span>
        <span style="font-weight:900;font-size:22px;color:#22c55e;filter:drop-shadow(0 0 6px rgba(34,197,94,.8))">OK</span>
        <span style="font-size:13px;color:#334155;margin-left:4px">· Ranking</span>
      </div>
      <button class="btn" onclick="setVista('mapa')" style="background:rgba(255,255,255,0.07);color:#94a3b8;padding:7px 14px;border-radius:10px;font-size:13px;font-weight:600">🗺️ Mapa</button>
    </div>
    <div style="display:flex;gap:8px;padding:10px 16px;background:rgba(5,10,20,0.96)">
      <button class="btn rfiltro active" data-f="todos" onclick="setRankFiltro('todos',this)" style="padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;background:#22c55e;color:#fff;border:none">🌐 Todos</button>
      <button class="btn rfiltro" data-f="comuna" onclick="setRankFiltro('comuna',this)" style="padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;background:rgba(255,255,255,0.06);color:#64748b;border:none">🏘️ Comunas</button>
      <button class="btn rfiltro" data-f="autopista" onclick="setRankFiltro('autopista',this)" style="padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;background:rgba(255,255,255,0.06);color:#64748b;border:none">🛣️ Autopistas</button>
    </div>
    <div id="rankingList" style="flex:1;overflow-y:auto;padding:0 16px 100px"></div>
    <div class="navbar" style="position:fixed">
      <button class="nav-btn" onclick="setVista('mapa')"><span>🗺️</span><span>Mapa</span></button>
      <button class="nav-btn active" onclick="setVista('ranking')"><span>🏆</span><span>Ranking</span></button>
    </div>
  </div>

  <!-- Notificación -->
  <div id="notif" style="display:none;position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(5,10,20,0.96);backdrop-filter:blur(16px);border:1px solid rgba(34,197,94,.35);color:#22c55e;padding:10px 20px;border-radius:14px;font-size:13px;font-weight:700;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.5);white-space:nowrap;animation:fadeIn .2s ease"></div>

</div>

<script>
const TIPOS = {
  "Microbasural":           { color:"#f59e0b", emoji:"🗑️", pts:-5  },
  "Escombros":              { color:"#f97316", emoji:"🧱", pts:-15 },
  "Residuos domiciliarios": { color:"#ef4444", emoji:"🛢️", pts:-10 },
  "Residuos peligrosos":    { color:"#dc2626", emoji:"☠️", pts:-25 },
  "Basura en autopista":    { color:"#b91c1c", emoji:"🛣️", pts:-20 },
};

const RANKING_DATA = [
  { nombre:"La Pintana",        tipo:"comuna",    pts:-201, reportes:48, delta:-12 },
  { nombre:"Pudahuel",          tipo:"comuna",    pts:-143, reportes:34, delta:-8  },
  { nombre:"Maipú",             tipo:"comuna",    pts:-118, reportes:27, delta:-3  },
  { nombre:"Santiago Centro",   tipo:"comuna",    pts:-87,  reportes:21, delta:2   },
  { nombre:"Ruta 68",           tipo:"autopista", pts:-76,  reportes:19, delta:-5  },
  { nombre:"Autopista Central", tipo:"autopista", pts:-55,  reportes:14, delta:-1  },
  { nombre:"Costanera Norte",   tipo:"autopista", pts:-33,  reportes:8,  delta:0   },
  { nombre:"Ñuñoa",             tipo:"comuna",    pts:-22,  reportes:6,  delta:1   },
  { nombre:"Providencia",       tipo:"comuna",    pts:-12,  reportes:3,  delta:0   },
  { nombre:"Las Condes",        tipo:"comuna",    pts:-8,   reportes:2,  delta:3   },
];

const INITIAL_PINS = [
  { id:1, lat:-33.4890, lng:-70.6693, tipo:"Microbasural",           comuna:"Pudahuel",         pts:-5,  tiempo:"hace 3 min",  ver:4  },
  { id:2, lat:-33.4569, lng:-70.6483, tipo:"Escombros",              comuna:"Santiago Centro",   pts:-15, tiempo:"hace 12 min", ver:2  },
  { id:3, lat:-33.4720, lng:-70.5980, tipo:"Basura en autopista",    comuna:"Autopista Central", pts:-20, tiempo:"hace 25 min", ver:7  },
  { id:4, lat:-33.5650, lng:-70.6320, tipo:"Residuos peligrosos",    comuna:"La Pintana",        pts:-25, tiempo:"hace 1h",     ver:11 },
  { id:5, lat:-33.5115, lng:-70.7580, tipo:"Microbasural",           comuna:"Maipú",             pts:-5,  tiempo:"hace 2h",     ver:3  },
  { id:6, lat:-33.4980, lng:-70.7210, tipo:"Residuos domiciliarios", comuna:"Pudahuel",          pts:-10, tiempo:"hace 3h",     ver:6  },
  { id:7, lat:-33.4350, lng:-70.5870, tipo:"Escombros",              comuna:"Ruta 68",           pts:-15, tiempo:"hace 4h",     ver:2  },
  { id:8, lat:-33.4560, lng:-70.6050, tipo:"Microbasural",           comuna:"Ñuñoa",             pts:-5,  tiempo:"hace 5h",     ver:1  },
];

let map, pins = [...INITIAL_PINS], mode = "idle", pendingLL = null, tipoSel = "", rankFiltro = "todos";
let pendingMarker = null;

// Init mapa
map = L.map('map', { center:[-33.4489,-70.6693], zoom:12, zoomControl:true, attributionControl:false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map);

// Click mapa
map.on('click', e => {
  if (mode !== 'placing') return;
  pendingLL = e.latlng;
  if (pendingMarker) { map.removeLayer(pendingMarker); }
  const el = document.createElement('div');
  el.style.cssText = 'position:relative;width:20px;height:20px';
  el.innerHTML = `<div style="position:absolute;inset:0;border-radius:50%;background:rgba(34,197,94,0.4);animation:ripple 1s ease-out infinite"></div><div style="position:absolute;inset:4px;border-radius:50%;background:#22c55e;border:2.5px solid #fff;box-shadow:0 0 0 4px rgba(34,197,94,0.3)"></div>`;
  pendingMarker = L.marker([e.latlng.lat, e.latlng.lng], {
    icon: L.divIcon({ html: el.outerHTML, className:'', iconSize:[20,20], iconAnchor:[10,10] })
  }).addTo(map);
  mostrarSheetTipo();
});

// Crear pin en mapa
function crearMarker(pin) {
  const cfg = TIPOS[pin.tipo];
  const badge = pin.ver > 1 ? `<div style="position:absolute;top:-5px;right:-10px;background:#fff;color:#111;border-radius:8px;font-size:9px;font-weight:900;padding:1px 5px;box-shadow:0 1px 4px rgba(0,0,0,0.35)">×${pin.ver}</div>` : '';
  const html = `<div style="position:relative;display:inline-block;filter:drop-shadow(0 4px 8px ${cfg.color}88)">
    <div style="width:38px;height:38px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${cfg.color};display:flex;align-items:center;justify-content:center;border:2.5px solid rgba(255,255,255,0.4);box-shadow:0 2px 12px ${cfg.color}66">
      <span style="transform:rotate(45deg);font-size:17px;line-height:1">${cfg.emoji}</span>
    </div>
    <div style="width:6px;height:3px;background:rgba(0,0,0,0.3);border-radius:50%;margin:1px auto 0;filter:blur(1.5px)"></div>
    ${badge}
  </div>`;
  const marker = L.marker([pin.lat, pin.lng], {
    icon: L.divIcon({ html, className:'', iconSize:[44,48], iconAnchor:[18,44] })
  }).addTo(map);
  marker.on('click', () => mostrarPopup(pin));
  return marker;
}

// Inicializar pins
INITIAL_PINS.forEach(p => crearMarker(p));

// ── UI FUNCTIONS ──

function setVista(v, btn) {
  const rs = document.getElementById('rankingScreen');
  if (v === 'ranking') {
    rs.classList.add('visible');
    renderRanking();
  } else {
    rs.classList.remove('visible');
  }
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function iniciarReporte() {
  ocultarTodo();
  mode = 'placing';
  map.getContainer().style.cursor = 'crosshair';
  document.getElementById('placingTip').style.display = 'block';
  document.getElementById('reportBtn').style.display = 'none';
}

function mostrarSheetTipo() {
  mode = 'typing';
  map.getContainer().style.cursor = '';
  document.getElementById('placingTip').style.display = 'none';
  const list = document.getElementById('tipoList');
  list.innerHTML = Object.entries(TIPOS).map(([tipo, cfg]) => `
    <button class="btn" onclick="seleccionarTipo('${tipo}')" style="display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-radius:13px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);width:100%">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:34px;height:34px;border-radius:9px;background:${cfg.color}22;display:flex;align-items:center;justify-content:center;font-size:17px">${cfg.emoji}</div>
        <span style="font-size:14px;font-weight:700;color:#e2e8f0">${tipo}</span>
      </div>
      <span style="font-size:13px;font-weight:800;color:${cfg.color}">${cfg.pts} pts</span>
    </button>`).join('');
  document.getElementById('sheetTipo').style.display = 'block';
}

function seleccionarTipo(tipo) {
  tipoSel = tipo;
  const cfg = TIPOS[tipo];
  document.getElementById('sheetTipo').style.display = 'none';
  document.getElementById('confirmCard').innerHTML = `
    <div style="width:42px;height:42px;border-radius:11px;font-size:20px;background:${cfg.color}20;display:flex;align-items:center;justify-content:center;flex-shrink:0">${cfg.emoji}</div>
    <div style="flex:1"><div style="font-size:14px;font-weight:800;color:#fff">${tipo}</div><div style="font-size:11px;color:#64748b">📍 Pin marcado en el mapa</div></div>
    <div style="font-size:18px;font-weight:900;color:#ef4444">${cfg.pts} pts</div>`;
  document.getElementById('sheetConfirm').style.display = 'block';
}

function volverTipo() {
  document.getElementById('sheetConfirm').style.display = 'none';
  mostrarSheetTipo();
}

function publicarPin() {
  if (!pendingLL || !tipoSel) return;
  const cfg = TIPOS[tipoSel];
  const comunas = ["Santiago Centro","Pudahuel","Maipú","La Pintana","Ñuñoa","Providencia"];
  const comuna = comunas[Math.floor(Math.random() * comunas.length)];
  const np = { id: Date.now(), lat: pendingLL.lat, lng: pendingLL.lng, tipo: tipoSel, comuna, pts: cfg.pts, tiempo: "ahora mismo", ver: 1 };
  pins.push(np);
  if (pendingMarker) { map.removeLayer(pendingMarker); pendingMarker = null; }
  crearMarker(np);
  document.getElementById('pinCount').textContent = `${pins.length} reportes`;
  cancelarReporte();
  notify(`📍 Pin creado en ${comuna} · ${cfg.pts} pts`);
}

function cancelarReporte() {
  mode = 'idle';
  tipoSel = '';
  pendingLL = null;
  if (pendingMarker) { map.removeLayer(pendingMarker); pendingMarker = null; }
  map.getContainer().style.cursor = '';
  ocultarTodo();
  document.getElementById('reportBtn').style.display = 'flex';
}

function ocultarTodo() {
  document.getElementById('sheetTipo').style.display = 'none';
  document.getElementById('sheetConfirm').style.display = 'none';
  document.getElementById('placingTip').style.display = 'none';
  document.getElementById('pinPopup').style.display = 'none';
}

function mostrarPopup(pin) {
  if (mode !== 'idle') return;
  const cfg = TIPOS[pin.tipo];
  document.getElementById('reportBtn').style.display = 'none';
  document.getElementById('pinPopupInner').style.borderColor = cfg.color + '44';
  document.getElementById('pinPopupInner').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div style="display:flex;gap:10px;align-items:center">
        <div style="width:42px;height:42px;border-radius:12px;font-size:20px;background:${cfg.color}20;display:flex;align-items:center;justify-content:center">${cfg.emoji}</div>
        <div>
          <div style="font-size:15px;font-weight:800;color:#fff">${pin.tipo}</div>
          <div style="font-size:11px;color:#64748b">${pin.comuna} · ${pin.tiempo}</div>
        </div>
      </div>
      <button class="btn" onclick="cerrarPopup()" style="background:rgba(255,255,255,0.07);color:#64748b;border-radius:8px;padding:4px 9px;font-size:12px">✕</button>
    </div>
    <div style="display:flex;gap:8px">
      <div style="flex:1;background:rgba(239,68,68,0.1);border-radius:10px;padding:8px;text-align:center;border:1px solid rgba(239,68,68,0.18)">
        <div style="font-size:18px;font-weight:900;color:#ef4444">${pin.pts}</div>
        <div style="font-size:10px;color:#64748b">puntos</div>
      </div>
      <div style="flex:1;background:rgba(255,255,255,0.04);border-radius:10px;padding:8px;text-align:center;border:1px solid rgba(255,255,255,0.07)">
        <div style="font-size:18px;font-weight:900;color:#fff" id="verCount_${pin.id}">×${pin.ver}</div>
        <div style="font-size:10px;color:#64748b">confirmados</div>
      </div>
      <button class="btn" onclick="confirmarPin(${pin.id})" style="flex:2;background:rgba(34,197,94,0.12);border-radius:10px;border:1px solid rgba(34,197,94,0.25);color:#22c55e;font-size:12px;font-weight:700;padding:8px">
        👍 Confirmar<br><span style="font-size:10px;opacity:.7">también lo vi</span>
      </button>
    </div>`;
  document.getElementById('pinPopup').style.display = 'block';
}

function cerrarPopup() {
  document.getElementById('pinPopup').style.display = 'none';
  document.getElementById('reportBtn').style.display = 'flex';
}

function confirmarPin(id) {
  const pin = pins.find(p => p.id === id);
  if (pin) { pin.ver++; document.getElementById('verCount_' + id).textContent = '×' + pin.ver; }
  notify("✅ ¡Confirmado! Gracias");
}

function getRankColor(pts) {
  if (pts > -20) return "#22c55e";
  if (pts > -50) return "#eab308";
  if (pts > -100) return "#f97316";
  return "#ef4444";
}

function setRankFiltro(f, btn) {
  rankFiltro = f;
  document.querySelectorAll('.rfiltro').forEach(b => {
    b.style.background = 'rgba(255,255,255,0.06)';
    b.style.color = '#64748b';
  });
  if (btn) { btn.style.background = '#22c55e'; btn.style.color = '#fff'; }
  renderRanking();
}

function renderRanking() {
  const filtered = RANKING_DATA
    .filter(r => rankFiltro === 'todos' ? true : r.tipo === rankFiltro)
    .sort((a,b) => a.pts - b.pts);
  const list = document.getElementById('rankingList');
  if (!filtered.length) { list.innerHTML = '<div style="text-align:center;color:#475569;padding:40px">Sin datos</div>'; return; }
  const top = filtered[0];
  let html = `<div style="margin:12px 0;background:linear-gradient(135deg,rgba(239,68,68,.18),rgba(185,28,28,.08));border:1px solid rgba(239,68,68,.28);border-radius:18px;padding:16px">
    <div style="font-size:10px;color:#ef4444;letter-spacing:2px;font-weight:800;margin-bottom:6px">💀 MÁS SUCIA DE CHILE</div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:22px;font-weight:900;color:#fff">${top.nombre}</div>
        <div style="font-size:12px;color:#64748b">${top.tipo==='autopista'?'🛣️ Concesionaria':'🏘️ Municipalidad'} · ${top.reportes} reportes</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:32px;font-weight:900;color:#ef4444">${top.pts}</div>
        <div style="font-size:10px;color:#64748b">pts penalización</div>
      </div>
    </div>
  </div>`;
  filtered.slice(1).forEach((r,i) => {
    const dc = r.delta < 0 ? '#ef4444' : r.delta > 0 ? '#22c55e' : '#475569';
    const dt = r.delta < 0 ? `▼${Math.abs(r.delta)}` : r.delta > 0 ? `▲${r.delta}` : '—';
    html += `<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:8px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-left:3px solid ${getRankColor(r.pts)}">
      <div style="width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#475569;flex-shrink:0">${i+2}</div>
      <div style="flex:1"><div style="font-weight:800;font-size:14px;color:#f1f5f9">${r.nombre}</div><div style="font-size:11px;color:#475569">${r.tipo==='autopista'?'🛣️':'🏘️'} ${r.reportes} reportes</div></div>
      <div style="text-align:right"><div style="font-size:16px;font-weight:900;color:${getRankColor(r.pts)}">${r.pts}</div><div style="font-size:10px;color:${dc}">${dt}</div></div>
    </div>`;
  });
  list.innerHTML = html;
}

function notify(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}
</script>
</body>
</html>
